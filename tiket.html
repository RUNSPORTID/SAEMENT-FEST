<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pilih Tiket</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, Arial, sans-serif;
}

body{
    background:#f5f6fa;
    color:#111827;
    padding-bottom:150px;
}

.container{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:24px 16px;
}

/* HEADER */

.logo-area{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-icon{
    width:48px;
    height:48px;
    border-radius:12px;
    background:#3146e0;
}

.logo h1{
    color:#2738c9;
    font-size:42px;
    font-weight:800;
}

.lang{
    background:#eef1f7;
    border-radius:30px;
    padding:14px 20px;
    font-size:22px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* STEP */

.steps{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:32px;
    overflow:auto;
}

.step{
    display:flex;
    align-items:center;
    gap:12px;
    white-space:nowrap;
}

.circle{
    width:44px;
    height:44px;
    border-radius:50%;
    border:2px solid #4563ff;
    color:#4563ff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:700;
}

.circle.inactive{
    border-color:#b7bcc9;
    color:#8a90a0;
}

.step-title{
    font-size:18px;
    font-weight:700;
}

.arrow{
    color:#8a90a0;
    font-size:28px;
    margin:0 8px;
}

/* BANNER */

.banner{
    width:100%;
    border-radius:24px;
    overflow:hidden;
    margin-bottom:32px;
}

.banner img{
    width:100%;
    display:block;
}

/* TITLE */

.section-title{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
}

.ticket-icon{
    width:32px;
    height:24px;
    border-radius:6px;
    background:#4563ff;
}

.section-title h2{
    font-size:34px;
}

/* CARD */

.ticket-card{
    position:relative;
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:28px;
    padding:28px;
    margin-bottom:20px;
    overflow:hidden;
}

.ticket-card::before,
.ticket-card::after{
    content:"";
    position:absolute;
    width:36px;
    height:36px;
    border-radius:50%;
    background:#f5f6fa;
    border:1px solid #e5e7eb;
    top:50%;
    transform:translateY(-50%);
}

.ticket-card::before{
    left:-18px;
}

.ticket-card::after{
    right:-18px;
}

.top-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
}

.ticket-name{
    font-size:18px;
    font-weight:700;
}

.badge{
    background:#eef2ff;
    color:#4563ff;
    padding:8px 14px;
    border-radius:10px;
    font-weight:600;
}

.divider{
    margin:24px 0;
    border-top:2px dashed #e5e7eb;
}

.bottom-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
}

.price{
    font-size:22px;
    font-weight:800;
}

/* BUTTON */

.select-btn{
    border:none;
    background:#4563ff;
    color:#fff;
    padding:16px 28px;
    border-radius:16px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
}

.select-btn.active{
    background:#2943d1;
}

/* COUNTER */

.counter{
    display:none;
    align-items:center;
    gap:12px;
}

.counter button{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#4563ff;
    color:#fff;
    font-size:24px;
    cursor:pointer;
}

.counter span{
    min-width:40px;
    text-align:center;
    font-size:20px;
    font-weight:700;
}

/* FLOATING BAR */

.checkout{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:#fff;
    padding:20px;
    box-shadow:0 -4px 24px rgba(0,0,0,.08);
}

.checkout-inner{
    max-width:900px;
    margin:auto;
}

.summary{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
}

.label{
    font-size:18px;
    font-weight:600;
}

.total{
    font-size:22px;
    font-weight:800;
}

.buy-btn{
    width:100%;
    border:none;
    background:#aeb9ff;
    color:#fff;
    font-size:22px;
    font-weight:700;
    padding:20px;
    border-radius:18px;
    cursor:not-allowed;
    transition:.3s;
}

.buy-btn.enabled{
    background:#4563ff;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

    .logo h1{
        font-size:28px;
    }

    .lang{
        padding:12px 18px;
        font-size:18px;
    }

    .section-title h2{
        font-size:22px;
    }

    .ticket-name{
        font-size:16px;
    }

    .price{
        font-size:18px;
    }

    .select-btn{
        padding:14px 22px;
        font-size:16px;
    }

    .buy-btn{
        font-size:18px;
        padding:18px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo-area">

        <div class="logo">
            <div class="logo-icon"></div>
            <h1>Artatix</h1>
        </div>

        <div class="lang">
            🇮🇩 ID
        </div>

    </div>

    <div class="steps">

        <div class="step">
            <div class="circle">1</div>
            <div class="step-title">Pilih Kategori</div>
        </div>

        <div class="arrow">›</div>

        <div class="circle inactive">2</div>

        <div class="arrow">›</div>

        <div class="circle inactive">3</div>

        <div class="arrow">›</div>

        <div class="circle inactive">4</div>

    </div>

    <div class="banner">
        <img src="banner.jpg" alt="Poster Event">
    </div>

    <div class="section-title">
        <div class="ticket-icon"></div>
        <h2>Kategori Tiket</h2>
    </div>

    <!-- CARD 1 -->

    <div class="ticket-card" data-price="150000">

        <div class="top-row">
            <div class="ticket-name">TRIBUN UTARA &amp; SELATAN</div>
            <div class="badge">On Sale</div>
        </div>

        <div class="divider"></div>

        <div class="bottom-row">

            <div class="price">Rp150.000</div>

            <button class="select-btn">
                Pilih Tiket
            </button>

            <div class="counter">
                <button class="minus">−</button>
                <span>1</span>
                <button class="plus">+</button>
            </div>

        </div>

    </div>

    <!-- CARD 2 -->

    <div class="ticket-card" data-price="250000">

        <div class="top-row">
            <div class="ticket-name">TRIBUN UTAMA</div>
            <div class="badge">On Sale</div>
        </div>

        <div class="divider"></div>

        <div class="bottom-row">

            <div class="price">Rp250.000</div>

            <button class="select-btn">
                Pilih Tiket
            </button>

            <div class="counter">
                <button class="minus">−</button>
                <span>1</span>
                <button class="plus">+</button>
            </div>

        </div>

    </div>

</div>

<div class="checkout">

    <div class="checkout-inner">

        <div class="summary">
            <div class="label">Harga Mulai dari</div>
            <div class="total" id="totalPrice">Rp 0</div>
        </div>

        <button id="buyBtn" class="buy-btn">
            Beli Sekarang
        </button>

    </div>

</div>

<script>

const cards = document.querySelectorAll('.ticket-card');
const totalPrice = document.getElementById('totalPrice');
const buyBtn = document.getElementById('buyBtn');

function formatRupiah(nominal){
    return 'Rp ' + nominal.toLocaleString('id-ID');
}

function updateTotal(){

    let total = 0;
    let qty = 0;

    cards.forEach(card=>{

        const count = parseInt(
            card.querySelector('.counter span').textContent
        );

        const active = card.querySelector('.counter').style.display === 'flex';

        if(active){
            total += count * parseInt(card.dataset.price);
            qty += count;
        }

    });

    totalPrice.textContent = formatRupiah(total);

    if(qty > 0){
        buyBtn.classList.add('enabled');
    }else{
        buyBtn.classList.remove('enabled');
    }
}

cards.forEach(card=>{

    const selectBtn = card.querySelector('.select-btn');
    const counter = card.querySelector('.counter');
    const minus = card.querySelector('.minus');
    const plus = card.querySelector('.plus');
    const number = card.querySelector('span');

    let count = 1;

    selectBtn.addEventListener('click',()=>{

        counter.style.display = 'flex';
        selectBtn.style.display = 'none';

        count = 1;
        number.textContent = count;

        updateTotal();
    });

    plus.addEventListener('click',()=>{

        count++;
        number.textContent = count;

        updateTotal();
    });

    minus.addEventListener('click',()=>{

        count--;

        if(count <= 0){

            counter.style.display = 'none';
            selectBtn.style.display = 'block';

            count = 1;

        }else{

            number.textContent = count;
        }

        updateTotal();
    });

});

buyBtn.addEventListener('click',()=>{

    if(buyBtn.classList.contains('enabled')){
        window.location.href = 'form.html';
    }

});

</script>

</body>
</html>
